  <path d="M90 820c340-95 1080-95 1420 0" fill="none" stroke="url(#horizon)" stroke-width="18"/>
  <circle cx="800" cy="781" r="5" fill="#ffffff" opacity="0.9"/>
  <text x="800" y="690" text-anchor="middle" fill="#ffffff" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="70" letter-spacing="28">MOBIUS</text>
  <text x="800" y="738" text-anchor="middle" fill="#cbd5e1" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="21" letter-spacing="6">TEMPORAL GOVERNANCE FOR AI PRODUCTION</text>
  <text x="800" y="812" text-anchor="middle" fill="#e6f0ff" font-family="Inter, Avenir, Helvetica, Arial, sans-serif" font-size="28" letter-spacing="8">让每一次行动，都被时间理解</text>
