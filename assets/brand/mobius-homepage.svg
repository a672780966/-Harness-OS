<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mobius homepage hero</title>
  <desc id="desc">A futuristic Mobius loop over a star field and planetary horizon with the Mobius wordmark.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="15%" r="85%">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="0.46" stop-color="#111827"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <linearGradient id="horizon" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.25" stop-color="#93c5fd" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>
    <filter id="hero-glow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" result="glow" type="matrix" values="0 0 0 0 0.75 0 0 0 0 0.85 0 0 0 0 1 0 0 0 0.9 0"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="hero-loop" x1="460" x2="1160" y1="220" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#e6f0ff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
    <path id="ring" d="M470 348c119-181 420-180 616-51 154 101 113 267-74 316-232 60-525-61-542-265Z"/>
  </defs>
  <rect width="1600" height="900" fill="url(#space)"/>
  <g opacity="0.9">
    <path d="M1010 0c-76 98-156 173-255 243-91 64-185 128-244 230" fill="none" stroke="#334155" stroke-width="36" stroke-linecap="round" opacity="0.22"/>
    <path d="M1068 0c-78 116-164 197-277 271-93 61-182 126-239 222" fill="none" stroke="#93c5fd" stroke-width="4" stroke-linecap="round" opacity="0.18"/>
  </g>
  <g fill="#e6f0ff">
    <circle cx="92" cy="86" r="1.6" opacity="0.65"/><circle cx="218" cy="165" r="2.1" opacity="0.75"/><circle cx="356" cy="76" r="1.7" opacity="0.7"/>
    <circle cx="531" cy="126" r="2.4" opacity="0.78"/><circle cx="696" cy="82" r="2.8" opacity="0.92"/><circle cx="846" cy="138" r="1.5" opacity="0.64"/>
    <circle cx="1042" cy="74" r="2.2" opacity="0.85"/><circle cx="1218" cy="158" r="1.9" opacity="0.75"/><circle cx="1380" cy="96" r="2.5" opacity="0.88"/>
    <circle cx="1490" cy="216" r="1.6" opacity="0.7"/><circle cx="177" cy="363" r="2.3" opacity="0.86"/><circle cx="1440" cy="438" r="2.7" opacity="0.9"/>
  </g>
  <g fill="none" stroke="#e6f0ff" stroke-dasharray="5 13" stroke-opacity="0.18">
    <ellipse cx="800" cy="438" rx="615" ry="177"/>
    <ellipse cx="800" cy="468" rx="505" ry="136"/>
    <ellipse cx="800" cy="700" rx="720" ry="132"/>
  </g>
  <g transform="rotate(-6 800 430)" filter="url(#hero-glow)">
    <use href="#ring" fill="none" stroke="url(#hero-loop)" stroke-linecap="round" stroke-width="30"/>
    <use href="#ring" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="8" opacity="0.9"/>
    <ellipse cx="800" cy="420" rx="248" ry="108" fill="#07101f" opacity="0.93"/>
    <path d="M493 347c99-92 234-126 360-91 106 30 184 98 247 178" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="11" opacity="0.82"/>
    <path d="M486 379c131 97 339 149 529 108 70-15 123-43 153-82" fill="none" stroke="#e6f0ff" stroke-linecap="round" stroke-width="8" opacity="0.68"/>
    <g stroke="#e6f0ff" stroke-linecap="round" stroke-width="6" opacity="0.9">
      <path d="M514 318l14 186"/><path d="M558 276l18 269"/><path d="M607 247l19 328"/><path d="M662 232l16 358"/>
      <path d="M719 231l11 360"/><path d="M777 241l5 340"/><path d="M835 259l-3 300"/><path d="M893 286l-10 244"/>
      <path d="M951 320l-17 176"/><path d="M1008 358l-22 97"/><path d="M1065 390l-29 35"/><path d="M1118 383l-31 109"/>
    </g>
