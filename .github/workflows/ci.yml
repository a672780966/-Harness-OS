# Harness OS CI — Gates: format → lint → typecheck → test → build → smoke
# P1-003: All gates run on Node 22 and 24. No continue-on-error.
# Reference: 05_RC_CI_VERSION_CONSISTENCY_FIX.md §4

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    strategy:
      matrix:
        node-version: [22, 24]
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --run

      - name: Build
        run: pnpm build

      - name: CLI smoke test
        run: node dist/index.js --version

  python-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: CLI smoke test
        run: python -m harness.copilot.cli version

      - name: Install test dependencies
        run: pip install pytest pyyaml

      - name: Python tests
        run: python -m pytest tests/ -q
